<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On Capacitor — Industrial Capacitors for High-Frequency Power Systems</title>
  <meta name="description" content="On Capacitor manufactures industrial capacitors for induction heating, melting furnaces, pulsed power, and high-voltage PFC applications. GB/T and IEC compliant.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav" id="nav"></nav>
<div class="nav-mobile" id="nav-mobile"></div>

<!-- Hero -->
<section class="hero">
  <div class="hero-media">
    <!-- Add hero background: <img src="images/hero-bg.jpg" alt=""> or <video autoplay muted loop playsinline><source src="videos/hero.mp4" type="video/mp4"></video> -->
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-content" id="hero"></div>
  <div class="hero-scroll">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    Scroll
  </div>
</section>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="container">
    <div class="stats-grid" id="stats"></div>
  </div>
</div>

<!-- Product Lines (white section) -->
<section class="section section--white" id="products">
  <div class="container">
    <div class="section-header fade-up" id="features-header"></div>
    <div id="features"></div>
  </div>
</section>

<!-- Applications / Who We Serve -->
<section class="section section--dark" id="applications">
  <div class="container">
    <div class="section-header fade-up" id="applications-header"></div>
    <div class="applications-grid" id="applications-grid"></div>
  </div>
</section>

<!-- Trust / Quality -->
<section class="section" id="quality">
  <div class="container">
    <div class="section-header fade-up" id="trust-header"></div>
    <div class="trust-grid" id="trust-grid"></div>
  </div>
</section>

<!-- Process / Sourcing Flow -->
<section class="section section--dark">
  <div class="container">
    <div class="section-header fade-up" id="process-header"></div>
    <div class="process-steps" id="process-steps"></div>
  </div>
</section>

<!-- About Teaser -->
<section class="section">
  <div class="container">
    <div class="split" id="about-teaser"></div>
  </div>
</section>

<!-- Products Preview -->
<section class="section section--dark">
  <div class="container">
    <div class="fade-up" style="text-align:center;max-width:600px;margin:0 auto 56px;" id="products-header"></div>
    <div class="products-grid" id="products-grid"></div>
    <div style="text-align:center;margin-top:48px;" class="fade-up" id="products-cta"></div>
  </div>
</section>

<!-- CTA Banner -->
<section class="cta-banner">
  <div class="container" id="cta"></div>
</section>

<footer class="footer" id="footer"></footer>

<script src="js/main.js"></script>
</body>
</html>
