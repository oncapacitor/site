<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="On Capacitor delivers cutting-edge capacitor technology for industrial, commercial, and R&D applications.">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav" id="nav"></nav>

<section class="hero">
