<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — On Capacitor</title>
  <meta name="description" content="Get in touch with On Capacitor. Request a quote, ask a technical question, or discuss a custom solution.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav scrolled" id="nav"></nav>
<div class="nav-mobile" id="nav-mobile"></div>

<section class="page-hero">
  <div class="container" id="page-hero"></div>
</section>

<section class="section section--white">
  <div class="container">
    <div class="contact-grid">

      <div class="fade-up">
        <div class="tag" id="contact-tag"></div>
        <h2 class="section-title" id="contact-title"></h2>
        <!-- Prose intro from content/contact.md -->
        <div data-md="content/contact.md" style="margin-bottom:32px;"></div>
        <div id="contact-details"></div>
      </div>

      <div class="fade-up">
        <form id="contact-form" class="contact-form" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First Name *</label>
              <input type="text" id="first-name" name="first_name" required placeholder="Jane">
            </div>
            <div class="form-group">
              <label for="last-name">Last Name *</label>
              <input type="text" id="last-name" name="last_name" required placeholder="Smith">
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="jane@company.com">
          </div>
          <div class="form-group">
            <label for="company">Company</label>
            <input type="text" id="company" name="company" placeholder="Acme Corp">
          </div>
          <div class="form-group">
            <label for="subject">Subject *</label>
            <select id="subject" name="subject" required></select>
          </div>
          <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" name="message" required placeholder="Tell us about your project or question…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Send Message</button>
          <div id="form-success" class="form-success">
            ✓ Message sent! We'll get back to you within one business day.
          </div>
        </form>
      </div>

    </div>
  </div>
</section>

<footer class="footer" id="footer"></footer>

<script src="js/main.js"></script>
</body>
</html>
