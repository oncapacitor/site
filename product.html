<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — On Capacitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .product-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: start;
    }
    .product-image {
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--off-white);
      box-shadow: var(--shadow-lg);
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }
    .product-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-image .placeholder-img { width: 100%; height: 100%; min-height: 320px; }

    .product-meta { margin-bottom: 32px; }
    .product-meta .tag { margin-bottom: 12px; }
    .product-meta h1 { font-size: clamp(1.5rem, 3vw, 2.25rem); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 20px; }
    .product-meta p { font-size: 1.05rem; color: var(--text-muted); line-height: 1.75; }

    .product-applications { margin: 32px 0; }
    .product-applications h3 { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .product-applications ul { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; }
    .product-applications li { font-size: 0.82rem; font-weight: 600; padding: 5px 12px; border-radius: 999px; background: rgba(14,122,254,0.08); color: var(--blue); }

    .specs-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .specs-table th { text-align: left; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 0 0 12px; border-bottom: 2px solid var(--gray-300); }
    .specs-table td { padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.06); font-size: 0.95rem; vertical-align: top; }
    .specs-table td:first-child { color: var(--text-muted); width: 48%; font-weight: 500; }
    .specs-table td:last-child { color: var(--text-dark); font-weight: 600; }
    .spec-tbd { color: var(--gray-300) !important; font-style: italic; font-weight: 400 !important; }

    .specs-section { margin-top: 40px; }
    .specs-section h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

    @media (max-width: 860px) {
      .product-detail-grid { grid-template-columns: 1fr; gap: 40px; }
      .product-image { position: static; }
    }
  </style>
</head>
<body>

<nav class="nav scrolled" id="nav"></nav>
<div class="nav-mobile" id="nav-mobile"></div>

<section class="page-hero">
  <div class="container" id="page-hero"></div>
</section>

<section class="section">
  <div class="container">
    <div class="product-detail-grid">

      <div class="product-image fade-up" id="product-image"></div>

      <div class="fade-up">
        <div class="product-meta" id="product-meta"></div>
        <div class="product-applications" id="product-applications"></div>
        <div class="specs-section">
          <h2>Technical Specifications</h2>
          <table class="specs-table">
            <thead>
              <tr><th>Parameter</th><th>Value</th></tr>
            </thead>
            <tbody id="specs-body"></tbody>
          </table>
        </div>
        <div style="margin-top:40px;" id="product-cta"></div>
      </div>

    </div>
  </div>
</section>

<section class="cta-banner">
  <div class="container">
    <h2>Have a specific requirement?</h2>
    <p>Talk to our engineers about custom specifications or to request a datasheet.</p>
    <div class="cta-actions">
      <a href="contact.html" class="btn btn-gold">Request a Quote</a>
      <a href="products.html" class="btn btn-outline">Back to Products</a>
    </div>
  </div>
</section>

<footer class="footer" id="footer"></footer>

<script src="js/main.js"></script>
</body>
</html>
